
<svg width="900" height="450" xmlns="http://www.w3.org/2000/svg">

<style>
.title {
    fill: white;
    font-size: 30px;
    font-family: Arial;
    font-weight: bold;
}

.label {
    fill: #c9d1d9;
    font-size: 16px;
    font-family: Arial;
}

.value {
    fill: white;
    font-size: 18px;
    font-family: Arial;
    font-weight: bold;
}

.small {
    fill: #8b949e;
    font-size: 14px;
    font-family: Arial;
}
</style>

<rect width="100%" height="100%" rx="20" fill="#0d1117"/>

<text x="30" y="45" class="title">
📊 Coding Profile Analytics
</text>

<!-- LeetCode Solved -->
<text x="30" y="90" class="label">
LeetCode Solved (260)
</text>

<rect x="30" y="100" width="320" height="18" rx="9" fill="#30363d"/>
<rect x="30" y="100" width="166.4" height="18" rx="9" fill="#FFA116"/>

<!-- Contest Rating -->
<text x="30" y="150" class="label">
Contest Rating (1376)
</text>

<rect x="30" y="160" width="320" height="18" rx="9" fill="#30363d"/>
<rect x="30" y="160" width="176.12800000000001" height="18" rx="9" fill="#58A6FF"/>

<!-- Streak -->
<text x="30" y="210" class="label">
Max Streak (26 days)
</text>

<rect x="30" y="220" width="320" height="18" rx="9" fill="#30363d"/>
