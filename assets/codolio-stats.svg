1483
</text>

<text x="30" y="330" class="label">
Active Days
</text>

<text x="250" y="330" class="value">
130
</text>

<!-- Right Side -->
<text x="500" y="90" class="label">
Problems Solved Comparison
</text>

<!-- LC -->
<rect x="520" y="90" width="60" height="260" fill="#FFA116"/>
<text x="530" y="380" class="small">LC</text>
<text x="520" y="80" class="small">260</text>

<!-- GFG -->
<rect x="620" y="158" width="60" height="192" fill="#2F8D46"/>
